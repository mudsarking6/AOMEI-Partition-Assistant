[注冊码已超过注冊次数]
ChineseSimplified = 注冊码在同一台设备上已超过注冊次数，请重新购买。
ChineseTraditional = 注冊碼在同一臺設備上已超過注冊次數，請重新購買。
English = The license code has already been registered the maximum number of times permitted for a same computer. Please click "Buy Now" button to purchase new license codes. If you believe that you are getting this message in error, please contact support@myrecover.com for help.
German = Der Lizenzcode wurde bereits so oft registriert, wie dies für denselben Computer zulässig ist. Klicken Sie auf "Jetzt kaufen", um neue Lizenzcodes zu erwerben. Wenn Sie der Meinung sind, dass diese Meldung irrtümlich angezeigt wird, wenden Sie sich an support@myrecover.com, um Hilfe zu erhalten.
Italian = Il codice di licenza è già stato registrato il numero massimo di volte consentito per uno stesso computer. Fa clic sul pulsante "Acquista Ora" per acquistare nuovi codici di licenza. Se ritiene di ricevere questo messaggio per errore, ci contatti: support@myrecover.com.
Russian = 
Japanese = ライセンスコードが同じデバイスでの登録数を超えています。［今すぐ購入］ボタンをクリックして、新しいライセンスコードを購入してください。このメッセージが誤って表示されていると思われる場合は、support@myrecover.comにご連絡ください。
French = Le code de licence a déjà été enregistré pour le maximum de fois autorisé pour un même ordinateur. Veuillez cliquer sur le bouton "Acheter" pour acheter de nouveaux codes de licence. Si vous pensez que vous recevez ce message par erreur, veuillez contacter support@myrecover.com pour obtenir de l'aide !
Dutch = 
Spanish = El código de licencia ya se ha registrado el número máximo de veces permitido para una misma computadora. Haga clic en el botón "Comprar ahora" para comprar nuevos códigos de licencia. Si cree que está recibiendo este mensaje por error, póngase en contacto con support@myrecover.com por ayuda.

