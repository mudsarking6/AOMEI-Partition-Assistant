[请复制机器码和注册码进行注冊]
ChineseSimplified = 请复制下方机器码和您购买软件时获得的注册码，通過下方网页链接生成离线启动码进行注冊。
ChineseTraditional = 請複製下方機器碼和您購買軟體時獲得的許可證，通過下方網頁連結生成離線啟動碼進行註冊。
English = Please copy the "Machine Code" below and the "License Code" you received when purchasing the program to generate an offline key via the link below to activate this software.  
German = Bitte kopieren Sie den untenstehenden „Maschinencode“ und den „Lizenzcode“, den Sie beim Kauf des Programms erhalten haben, um einen Offline-Schlüssel über den untenstehenden Link zu generieren, um diese Software zu aktivieren. 
Italian = Copia il "Codice Macchina" qui sotto e il "Codice di Licenza" ricevuto al momento dell'acquisto del programma per generare una chiave offline tramite il link sottostante per attivare il software.  
Russian = 
Japanese = 下記の「マシンコード」と、プログラム購入時に受け取った「ライセンスコード」をコピーして、下記のWebリンクからオフライン登録コードを生成し、本ソフトウェアを有効にしてください。
French = Veuillez copier le "Code de machine" ci-dessous et le "Code de Licence" que vous avez reçu lors de l'achat du programme pour générer une clé hors ligne via le lien ci-dessous pour activer ce logiciel. 
Dutch = 
Spanish = Por favor, copie el "Código de la Máquina" que aparece abajo y el "Código de licencia" que recibió al comprar el programa para generar una clave fuera de línea a través del siguiente enlace para activar este software. 

[你的注册码仅用于当前版本]
ChineseSimplified = 你的注册码是“当前版本”，仅用于%s版本。它不能用于注冊%s版本，你可以下载可注册的最新版本继续使用。如果想要永久获得免费的大版本更新和免费的技术支持，请升級到“終身版”，允许您免费升級到任何新版本。
ChineseTraditional = 您的註冊碼是“當前版”，僅適用於%1版本。不能用於註冊%2版本。您可以下載並安裝最新的可註冊版本繼續使用。\n\n要永久獲得免費的大版本更新和免費的技術支持，請升級到“終身版”，允許您免費升級到任何新版本。
English = Your license code is "Current Version", which is only valid for version %s. It cannot be used to register the version %s. You can download and install the latest registrable version to continue using.\n\nTo receive free major updates and free technical support forever, please upgrade to "Lifetime Version" which entitles you to upgrade for free to any later new versions.
German = Ihr Lizenzcode ist „Aktuelle Version", der nur für die Version %s gültig ist. Es kann nicht verwendet werden, um die Version %s zu registrieren. Sie können die neueste registrierbare Version herunterladen und installieren, um sie weiter zu verwenden.\n\nUm für immer kostenlose Haupt-Updates und kostenlosen technischen Support zu erhalten, aktualisieren Sie bitte auf die „Lebenslange Version", die Sie zu einem kostenlosen Upgrade auf alle späteren neuen Versionen berechtigt.
Italian = Il tuo codice di licenza è "Versione Attuale" che è valido solo per la versione %s. Non può essere utilizzato per registrare la versione %s. Puoi scaricare e installare l'ultima versione registrabile per continuare a utilizzare.\n\nPer ricevere aggiornamenti principali gratuiti e supporto tecnico gratuito per sempre, esegui l'upgrade a "Versione a vita" che ti dà diritto all'aggiornamento gratuito a eventuali nuove versioni successive.
Russian = 
Japanese = 登録コードは「現在のバージョン」であり、%s版にのみ適用されます。%s版の登録には使用できません。登録可能な最新バージョンをダウンロードしてインストールし、引き続き使用できます。\n\n無料のメジャーバージョンアップデートと無料のテクニカルサポートを永久に利用するには、「無期限版」にアップグレードしてください。これにより、新しいバージョンに無料でアップグレードできます。
French = Votre code de licence est "Version Actuelle", qui n'est valable que pour la version %s. Il ne peut pas être utilisé pour enregistrer la version %s. Vous pouvez télécharger et installer la dernière version enregistrable pour continuer à l'utiliser.\n\nPour recevoir des mises à jour majeures gratuites et un support technique gratuit pour toujours, veuillez passer à la "Version à vie" qui vous permet de passer gratuitement à toute nouvelle version ultérieure.
Dutch = 
Spanish = Su código de licencia es "Versión actual", que sólo es válido para la versión %s. No se puede utilizar para registrar la versión %s. Puede descargar e instalar la última versión registrable para seguir utilizándola.\n\n Para recibir las principales actualizaciones gratuitas y soporte técnico gratuito para siempre, por favor, actualice a la "Versión de por vida" que le da derecho a actualizar gratuitamente a cualquier nueva versión posterior.

[你的注册码仅对9.6.0之前的版本有效]
ChineseSimplified = 你的注册码是“当前版本”，仅对9.6.0之前的版本有效。它不能用于注冊%s版本，你可以下载可注册的最新版本继续使用。如果想要永久获得免费的大版本更新和免费的技术支持，请升級到“終身版”，允许您免费升級到任何新版本。
ChineseTraditional = 您的許可代碼為“當前版本”，僅對9.6.0之前的版本有效。它不能用於註冊版本%1。您可以下載最新的可註冊版本繼續使用。升級到“終身版本”可以獲得永久免費重大更新和技術支援。
English = Your license code is "Current Version", which is only valid for the versions previous to 9.6.0. It cannot be used to register the version %s. You can download and install the latest registrable version to continue using.\n\nTo receive free major updates and free technical support forever, please upgrade to "Lifetime Version" which entitles you to upgrade for free to any later new versions.
German = Ihr Lizenzcode ist „Aktuelle Version", der nur für die Versionen vor 9.6.0 gültig ist. Er kann nicht verwendet werden, um die Version %s zu registrieren. Sie können die neueste registrierbare Version herunterladen und installieren, um sie weiter zu verwenden.\n\nUm für immer kostenlose Haupt-Updates und kostenlosen technischen Support zu erhalten, aktualisieren Sie bitte auf die „Lebenslange Version", die Sie zu einem kostenlosen Upgrade auf alle späteren neuen Versionen berechtigt.
Italian = Il tuo codice di licenza è "Versione Attuale" che è valido solo per le versioni precedenti alla 9.6.0. Non può essere utilizzato per registrare la versione %s. Puoi scaricare e installare l'ultima versione registrabile per continuare a utilizzare.\n\nPer ricevere gratuitamente gli aggiornamenti principali e il supporto tecnico per sempre, aggiorna a "Versione a Vita" che ti dà diritto ad eseguire l'aggiornamento gratuitamente a qualsiasi nuove versioni successive.
Russian = 
Japanese = お使いのライセンスコードは現在版です。9.6.0以前のバージョンでのみ使用可能です。%sバージョンで使用できません。引き続き使用するには、登録可能な最新版をインストールしてください。\n\nメジャーアップデートと技術サポートが生涯無料で受けられるために、最新版へ無料更新できる「無期限版」にアップグレードしてください。
French = Votre code de licence est "Version Actuelle", qui n'est valable que pour les versions antérieures à 9.6.0. Il ne peut pas être utilisé pour enregistrer la version %s. Vous pouvez télécharger et installer la dernière version enregistrable pour continuer à l'utiliser.\n\nPour recevoir des mises à jour majeures gratuites et un support technique gratuit pour toujours, veuillez passer à la "Version à vie" qui vous permet de passer gratuitement à toute nouvelle version ultérieure.
Dutch = 
Spanish = Su código de licencia es "Versión Actual", que sólo es válido para las versiones anteriores a la 9.6.0. No se puede utilizar para registrar la versión %s. Puede descargar e instalar la última versión registrable para seguir utilizándola.\n\nPara recibir las principales actualizaciones gratuitas y soporte técnico gratuito para siempre, por favor, actualice a la "Versión de por vida" que le da derecho a actualizar gratuitamente a cualquier nueva versión posterior.

